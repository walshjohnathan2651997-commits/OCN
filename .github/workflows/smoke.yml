name: smoke

# Confidential Lightweight V3.17 smoke CI.
#
# Runs ONLY toy / synthetic data tests. Never touches real PDFs, never
# requires the real dataset, never calls any API or network.
#
# CI runs ONLY:
#   - toy end-to-end demo
#   - schema validation (toy mode)
#   - redteam scan (public-only dirs)
#   - pytest (smoke subset)
#
# CI does NOT run:
#   - real PDF extraction
#   - real BM25 retrieval
#   - R4 heavy evaluation
#   - private release bundle build
#   - any stage requiring --allow_private_data true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  smoke-toy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pyyaml numpy pandas scikit-learn

      - name: Compile check
        run: |
          python -m compileall -q scripts tests

      - name: Toy end-to-end demo
        run: |
          python scripts/run_toy_end_to_end_demo_v1.py

      - name: Schema validation (toy)
        run: |
          python scripts/validate_experiment_outputs_v1.py --toy_mode

      - name: Redteam scan (public only)
        run: |
          python scripts/run_confidentiality_redteam_scan_v1.py --scan_public_only

      - name: Smoke tests
        run: |
          pytest -q \
            tests/test_current_mainline_docs.py \
            tests/test_no_private_text_in_public_outputs.py \
            tests/test_pipeline_runner_toy.py \
            tests/test_release_bundle_safety.py \
            tests/test_redteam_scan_toy_passes.py \
            tests/test_paper_assets_no_private_text.py \
            tests/test_pipeline_runner.py \
            tests/test_config_guards.py \
            tests/test_schema_registry.py \
            tests/test_toy_demo_runs.py

      - name: Verify V3.17 confidential lightweight mentioned in docs
        run: |
          python - <<'PY'
          from pathlib import Path
          repo = Path(".")
          needles = ["V3.17", "confidential", "lightweight"]
          candidates = [
              repo / "experiments" / "README.md",
              repo / "README.md",
          ]
          found = False
          for p in candidates:
              if p.exists():
                  text = p.read_text(encoding="utf-8").lower()
                  if all(n.lower() in text for n in needles):
                      found = True
                      break
          assert found, "No README mentions V3.17 + confidential + lightweight"
          PY

      - name: Verify data release policy exists
        run: |
          python - <<'PY'
          from pathlib import Path
          repo = Path(".")
          candidates = [
              repo / "docs" / "data_release_policy.md",
              repo / "docs" / "DATA_RELEASE_POLICY.md",
              repo / "DATA_RELEASE_POLICY.md",
              repo / "docs" / "data_release.md",
          ]
          docs_dir = repo / "docs"
          if docs_dir.exists():
              for p in docs_dir.iterdir():
                  if p.is_file():
                      name_lower = p.name.lower()
                      if "release" in name_lower and "policy" in name_lower:
                          candidates.append(p)
          found = any(p.exists() for p in candidates)
          assert found, "No data release policy document found"
          PY

      - name: Verify real-mode stages are not CI-triggered
        run: |
          python - <<'PY'
          # Verify that the Makefile p0-real target requires --allow_private_data true
          # and that no CI-safe target accidentally triggers real data runs.
          from pathlib import Path
          makefile = Path("Makefile").read_text(encoding="utf-8")
          assert "--allow_private_data true" in makefile, \
              "p0-real target must require --allow_private_data true"
          # Verify toy target does NOT include --allow_private_data
          toy_section = makefile.split(".PHONY: toy")[1].split(".PHONY:")[0]
          assert "--allow_private_data" not in toy_section, \
              "toy target must not include --allow_private_data"
          print("OK: real-mode stages are properly gated")
          PY
