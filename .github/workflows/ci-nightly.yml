name: ci-nightly

# Nightly full test suite for CESE-OCN.
#
# Per P4c: "全量 pytest 可以作为 nightly, 不要在 smoke CI 中强制跑长流程。"
# This job runs the entire pytest suite once per day so long-running tests
# do not block PRs.

on:
  schedule:
    # Run at 03:00 UTC daily.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest

      - name: Compile check
        run: |
          python -m compileall -q cese scripts tests

      - name: Full pytest
        run: |
          pytest -q tests/

      - name: Paper-readiness gate (smoke data, expected to fail)
        # Smoke data is NOT paper-ready. This step verifies the gate
        # actually fails (non-zero exit) on toy data; we allow failure
        # here because the nightly is not expected to be paper-ready.
        continue-on-error: true
        run: |
          python scripts/check_paper_readiness.py --results_dir outputs/smoke_minimal --release_dir release || echo "Expected: paper-readiness gate fails on smoke data"
