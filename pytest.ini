[pytest]
# P1: pytest markers for splitting fast vs slow tests.
# ocn-29: addopts skips ``@pytest.mark.slow`` by default so a plain
# ``pytest -q tests/test_run_pilot_loop.py`` invocation does NOT run
# 5+ full training loops (which can deadlock under TRAE / pytest /
# timeout-wrapper pipe capture). To run the slow suite explicitly:
#   pytest -q -m "slow" tests/test_run_pilot_loop.py
# or override: ``pytest -o addopts="" -q tests/...``.
markers =
    slow: slow integration tests (real training, full pipeline, subprocess spawns)
    integration: end-to-end pipeline tests that spawn subprocesses or run run_all

# Default: skip slow tests. Override with -o addopts="" to run them.
addopts = -m "not slow"

# Only collect from tests/ — prevents collecting duplicate tests from
# release_bundles/<bundle>/tests/ which would run scripts from the bundle
# directory and create stray artifacts there.
testpaths = tests

# Keep warnings concise but visible.
filterwarnings =
    ignore::DeprecationWarning
