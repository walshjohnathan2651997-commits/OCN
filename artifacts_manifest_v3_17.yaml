# Artifacts Manifest — V3.17 Confidential Lightweight
#
# Authority: This manifest defines every artifact group in the V3.17
# mainline. The build_artifact_ledger_v1.py script reads this manifest,
# scans each artifact for sensitive columns, and generates the artifact
# ledger (CSV/MD) and release safety manifest (JSON).
#
# Hard boundaries:
#   - No PDFs are released.
#   - No claim/evidence raw text is released.
#   - No private artifacts enter the public release bundle.
#   - Heavy experiments are not re-run; the ledger is built from existing
#     outputs only.

manifest_version: "1.0"
manifest_date: "2026-07-07"
mainline: "V3.17 Confidential Lightweight"

# Sensitive column names — if any of these appear in a CSV's header,
# the artifact is flagged contains_raw_text=true.
sensitive_text_columns:
  - claim_text
  - evidence_text
  - selected_evidence
  - raw_text
  - clean_text
  - body_text
  - pdf_text
  - generation_notes
  - title
  - url

# Model/evaluation column names — if any of these appear, the artifact
# is flagged contains_labels=true or contains_oracle_eval=true.
label_columns:
  - true_label
  - candidate_label_guess
  - final_label
  - gold_label
  - human_audited
  - silver_label_source

oracle_columns:
  - oracle_hit
  - oracle_match
  - oracle_recall
  - oracle_evidence
  - oracle_hash

# Artifact groups — each group has a list of artifacts to scan.
artifact_groups:

  # ---------- Dataset ----------

  - group_id: G01_dataset
    description: "SimClaim Strict Silver Diagnostic Set v1 (444 candidates)"
    artifacts:
      - artifact_id: A001_strict_silver_csv
        path: "data/simclaim_all92_candidate_pool_v1/strict_silver_max_v1/strict_silver_max_candidates_v1.csv"
        artifact_type: dataset_csv
        generated_by_script: "scripts/build_strict_silver_max_v1.py"
        input_artifacts: "data/simclaim_all92_candidate_pool_v1/all92_claim_candidates_merged.csv"
        run_mode: real
        public_safe: false
        private_sensitive: true
        notes: "Controlled silver diagnostic; contains claim_text, evidence_text, labels. Never released publicly."

      - artifact_id: A002_strict_silver_groups
        path: "data/simclaim_all92_candidate_pool_v1/strict_silver_max_v1/strict_silver_max_groups_v1.csv"
        artifact_type: dataset_metadata
        generated_by_script: "scripts/build_strict_silver_max_v1.py"
        input_artifacts: "A001_strict_silver_csv"
        run_mode: real
        public_safe: true
        private_sensitive: false
        notes: "Group-level metadata only; no raw text or labels."

      - artifact_id: A003_dataset_version_lock
        path: "docs/dataset_version_lock_v3_17.md"
        artifact_type: documentation
        generated_by_script: "manual"
        input_artifacts: "A001_strict_silver_csv"
        run_mode: real
